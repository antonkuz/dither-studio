<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dither Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            align-items: start;
        }

        /* Left column */
        .left-column {
            min-width: 0;
        }

        .drop-zone {
            border: 2px dashed #333;
            padding: 60px 40px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 24px;
            transition: all 0.3s;
            background: #16213e;
        }

        .drop-zone.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .drop-zone h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .drop-zone p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .drop-zone-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid #333;
            background: #16213e;
            color: #eee;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .btn:hover {
            border-color: #0f3460;
            background: #1a1a40;
        }

        .btn-primary {
            background: #e94560;
            border-color: #e94560;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }

        .btn-outlined {
            background: transparent;
            border-color: #555;
        }

        .btn-outlined:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .drop-zone.hidden {
            display: none;
        }

        .image-output {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }

        .clear-btn {
            margin-bottom: 12px;
        }

        .clear-btn.hidden {
            display: none;
        }

        .image-output img {
            width: 100%;
            height: auto;
            display: block;
            max-height: calc(100vh - 200px);
            object-fit: contain;
        }

        #ditheredImage {
            background: #111;
        }

        /* Right column — sidebar */
        .sidebar {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
        }

        .sidebar h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .sidebar h4 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-top: 28px;
            margin-bottom: 14px;
        }

        .slider-group {
            margin-bottom: 18px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .slider-group label span {
            font-size: 13px;
            font-weight: 600;
            color: #e94560;
            min-width: 24px;
            text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #0f3460;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            border: none;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .color-option input {
            display: none;
        }

        .color-option .swatch {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 3px solid #333;
            transition: all 0.15s;
        }

        .color-option input:checked + .swatch {
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .color-option:hover .swatch {
            transform: scale(1.1);
        }

        .custom-color {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        .custom-color label {
            font-size: 14px;
            color: #ccc;
        }

        .custom-color input[type="color"] {
            -webkit-appearance: none;
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-radius: 8px;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .custom-color input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        .custom-color input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .custom-color .hex-value {
            font-size: 13px;
            color: #888;
            font-family: monospace;
        }

        /* Hide native file input */
        #fileInput {
            display: none;
        }

        /* Responsive */
        @media (max-width: 800px) {
            body {
                padding: 20px;
            }

            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dither Studio</h1>
            <p>Apply dithering effects to your images</p>
        </div>

        <div class="main-layout">
            <div class="left-column">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">&#x1F5BC;</div>
                    <h2>Drop an image here</h2>
                    <p>or choose an option below</p>
                    <div class="drop-zone-buttons">
                        <button class="btn btn-primary" id="chooseFileBtn">Choose File</button>
                        <button class="btn btn-outlined" id="webcamBtn">Use Webcam</button>
                        <button class="btn btn-outlined" id="exampleBtn">Example Image</button>
                    </div>
                </div>
                <input type="file" id="fileInput" accept="image/*,video/*">

                <button class="btn btn-outlined clear-btn hidden" id="clearBtn">Reset Input Source</button>
                <div class="image-output">
                    <img id="ditheredImage" src="" alt="Dithered image">
                </div>
            </div>

            <div class="sidebar">
                <h3>Dither Settings</h3>

                <div class="slider-group">
                    <label>Roughness <span id="stepValue">1</span></label>
                    <input type="range" id="step" min="1" max="8" value="1">
                </div>

                <div class="slider-group">
                    <label>Brightness <span id="brightnessValue">0</span></label>
                    <input type="range" id="brightness" min="-10" max="10" value="0">
                </div>

                <h4>Color</h4>

                <div class="color-picker" id="colorPicker">
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="255,255,255" checked>
                        <span class="swatch" style="background: rgb(255,255,255)"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="255,0,0">
                        <span class="swatch" style="background: rgb(255,0,0)"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="255,127,0">
                        <span class="swatch" style="background: rgb(255,127,0)"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="246,194,3">
                        <span class="swatch" style="background: #f6c203"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="0,127,255">
                        <span class="swatch" style="background: rgb(0,127,255)"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="0,0,255">
                        <span class="swatch" style="background: rgb(0,0,255)"></span>
                    </label>
                    <label class="color-option">
                        <input type="radio" name="ditherColor" data-color="127,0,255">
                        <span class="swatch" style="background: rgb(127,0,255)"></span>
                    </label>
                </div>

                <div class="custom-color">
                    <label>Custom</label>
                    <input type="color" id="customColor" value="#ff00ff">
                    <span class="hex-value" id="customColorHex">#ff00ff</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
