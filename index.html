<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dither Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 20px;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 4px 4px 0 #6366F1;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            align-items: start;
        }

        /* Left column */
        .left-column {
            min-width: 0;
        }

        /* Drop zone */
        .drop-zone {
            padding: 0;
            margin-bottom: 24px;
        }

        .drop-zone.hidden {
            display: none;
        }

        .drop-zone-inner {
            padding: 48px 32px;
            text-align: center;
        }

        .drop-zone.dragover .nes-container {
            border-color: #6366F1 !important;
            background: rgba(99, 102, 241, 0.08);
        }

        .drop-zone-icon {
            margin-bottom: 20px;
            color: #888;
        }

        .drop-zone-icon svg {
            width: 48px;
            height: 48px;
        }

        .drop-zone h2 {
            font-size: 11px;
            margin-bottom: 10px;
            color: #fff;
        }

        .drop-zone p {
            color: #888;
            font-size: 8px;
            margin-bottom: 28px;
            line-height: 1.8;
        }

        .drop-zone-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .drop-zone-buttons .nes-btn {
            font-size: 8px;
        }

        /* Clear button */
        .clear-btn {
            margin-bottom: 16px;
            font-size: 8px;
        }

        .clear-btn.hidden {
            display: none;
        }

        /* Image output */
        .image-output {
            background: #111;
            overflow: hidden;
            /* NES pixel border via box-shadow trick */
            box-shadow:
                0 0 0 4px #111,
                0 0 0 6px #eee;
        }

        .image-output img {
            width: 100%;
            height: auto;
            display: block;
            max-height: calc(100vh - 200px);
            object-fit: contain;
        }

        #ditheredImage {
            background: #111;
        }

        #ditheredImage[hidden] {
            display: none;
        }

        /* Sidebar NES container override for dark bg */
        .sidebar-container {
            background: #16213e !important;
            color: #eee !important;
        }

        .sidebar-container::after,
        .sidebar-container::before {
            background: #16213e !important;
        }

        .sidebar-container .title {
            background: #16213e !important;
            font-size: 10px;
            color: #6366F1 !important;
        }

        .sidebar h4 {
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-top: 24px;
            margin-bottom: 14px;
        }

        /* Sliders */
        .slider-group {
            margin-bottom: 20px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 8px;
            color: #ccc;
            margin-bottom: 10px;
        }

        .slider-group label span {
            font-size: 8px;
            font-weight: 600;
            color: #6366F1;
            min-width: 24px;
            text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #0f3460;
            outline: none;
            cursor: pointer;
            /* pixelated look */
            border: 2px solid #eee;
            box-shadow: 2px 2px 0 #000;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #6366F1;
            cursor: pointer;
            border: 2px solid #eee;
            box-shadow: 2px 2px 0 #000;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #6366F1;
            cursor: pointer;
            border: 2px solid #eee;
            box-shadow: 2px 2px 0 #000;
        }

        /* Color swatches */
        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .color-option input {
            display: none;
        }

        .color-option .swatch {
            width: 36px;
            height: 36px;
            border: 4px solid #555;
            box-shadow: 3px 3px 0 #000;
            transition: transform 0.1s;
        }

        .color-option input:checked + .swatch {
            border-color: #6366F1;
            box-shadow: 3px 3px 0 #6366F1;
        }

        .color-option:hover .swatch {
            transform: scale(1.1);
        }

        /* Custom color */
        .custom-color {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
        }

        .custom-color label {
            font-size: 8px;
            color: #ccc;
        }

        .custom-color input[type="color"] {
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            border: 4px solid #555;
            box-shadow: 3px 3px 0 #000;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .custom-color input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        .custom-color input[type="color"]::-webkit-color-swatch {
            border: none;
        }

        .custom-color .hex-value {
            font-size: 8px;
            color: #888;
            font-family: 'Press Start 2P', monospace;
        }

        /* Hide native file input */
        #fileInput {
            display: none;
        }

        /* Mobile divider */
        .mobile-divider {
            display: none;
            border: none;
            border-top: 4px solid #eee;
            box-shadow: 0 2px 0 #000;
            margin: 0;
        }

        /* NES container dark override */
        .nes-container.is-dark {
            background-color: #16213e;
            color: #eee;
        }

        .nes-container.is-dark::after,
        .nes-container.is-dark::before {
            background-color: #16213e;
        }

        .nes-container.is-dark.with-title > .title {
            background-color: #16213e;
            color: #6366F1;
            font-size: 9px;
        }

        /* Drop zone NES container dark */
        .drop-zone .nes-container.is-dark::after,
        .drop-zone .nes-container.is-dark::before {
            background-color: #16213e;
        }

        /* Responsive */
        @media (max-width: 800px) {
            body {
                padding: 16px;
            }

            .main-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .mobile-divider {
                display: block;
            }

            .drop-zone-inner {
                padding: 32px 16px;
            }

            .drop-zone-buttons {
                flex-direction: column;
            }

            .drop-zone-buttons .nes-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dither Studio</h1>
        </div>

        <div class="main-layout">
            <div class="left-column">
                <div class="drop-zone" id="dropZone">
                    <section class="nes-container is-dark">
                        <div class="drop-zone-inner">
                            <div class="drop-zone-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <path d="M21 15l-5-5L5 21"/>
                                </svg>
                            </div>
                            <h2>Choose your image source</h2>
                            <p>Drop an image here, or select an option below</p>
                            <div class="drop-zone-buttons">
                                <button class="nes-btn is-primary" id="chooseFileBtn">
                                    <span class="btn-label">Choose File</span>
                                </button>
                                <button class="nes-btn is-warning" id="webcamBtn">
                                    <span class="btn-label">Use Webcam</span>
                                </button>
                                <button class="nes-btn is-success" id="exampleBtn">
                                    <span class="btn-label">Example Image</span>
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
                <input type="file" id="fileInput" accept="image/*,video/*">

                <button class="nes-btn is-error clear-btn hidden" id="clearBtn">Reset Input Source</button>
                <div class="image-output">
                    <img id="ditheredImage" src="" alt="Dithered image" hidden>
                </div>
            </div>

            <hr class="mobile-divider">

            <div class="sidebar">
                <section class="nes-container with-title is-dark sidebar-container">
                    <p class="title">Settings</p>

                    <div class="slider-group">
                        <label>Roughness <span id="stepValue">1</span></label>
                        <input type="range" id="step" min="1" max="8" value="1">
                    </div>

                    <div class="slider-group">
                        <label>Brightness <span id="brightnessValue">100%</span></label>
                        <input type="range" id="brightness" min="-10" max="10" value="0">
                    </div>

                    <h4>Color</h4>

                    <div class="color-picker" id="colorPicker">
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="255,255,255" checked>
                            <span class="swatch" style="background: rgb(255,255,255)"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="255,0,0">
                            <span class="swatch" style="background: rgb(255,0,0)"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="255,127,0">
                            <span class="swatch" style="background: rgb(255,127,0)"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="246,194,3">
                            <span class="swatch" style="background: #f6c203"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="0,127,255">
                            <span class="swatch" style="background: rgb(0,127,255)"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="0,0,255">
                            <span class="swatch" style="background: rgb(0,0,255)"></span>
                        </label>
                        <label class="color-option">
                            <input type="radio" name="ditherColor" data-color="127,0,255">
                            <span class="swatch" style="background: rgb(127,0,255)"></span>
                        </label>
                    </div>

                    <div class="custom-color">
                        <label>Custom</label>
                        <input type="color" id="customColor" value="#ff00ff">
                        <span class="hex-value" id="customColorHex">#ff00ff</span>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
